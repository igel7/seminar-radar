# ------------------------------------------------------------
# ネット検索による新規発見(定点リスト外の拾い漏れ対策)
# 毎日この観点で web 検索を行い、新規イベントを追加する
# ------------------------------------------------------------
discovery_topics:
  - "中央銀行・金融政策に関する会議やセミナー(ドイツ国内またはオンライン)。例: monetary policy conference Frankfurt, Geldpolitik Konferenz"
  - "ドイツ実体経済に関するセミナー。特にエネルギー価格・オイルショック、防衛支出拡大、インフラ投資(Sondervermögen)関連。例: defence industry conference Germany, Energiepreise Konferenz, Infrastruktur Investitionen Veranstaltung"
  - "金融規制・金融市場に関する会議。例: banking regulation conference Frankfurt, financial stability conference Germany, Bankenaufsicht Symposium"
  - "省庁・規制当局・業界団体・メディア主催の単発イベント(サミット、年次会議、パネル討論)。例: BMF BMWK Konferenz, Bankenverband Veranstaltung, finance summit Germany 2026"
  - "中東欧・バルカン・バルトの中央銀行の研究セミナー・年次会議(例: NBR BEARS seminar, Eesti Pank research seminar, Banka Slovenije seminar, CBBH research seminar, National Bank of Serbia seminar, central bank research conference CEE)"
  - "中東欧の大型政策・安全保障・経済フォーラム(例: Economic Forum Karpacz, Bled Strategic Forum, Warsaw Security Forum, GLOBSEC, IISS Prague Defence Summit, MSPO defence exhibition)。防衛・地経学はテーマ②に直結"
