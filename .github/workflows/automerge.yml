name: automerge-claude-branch
on:
  push:
    branches:
      - 'claude/**'
permissions:
  contents: write
concurrency:
  group: automerge
  cancel-in-progress: false
jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Merge routine branch into main
        run: |
          git config user.name  "seminar-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git merge --no-edit -X theirs "origin/${GITHUB_REF_NAME}"
          git push origin main
      - name: Delete routine branch
        run: git push origin --delete "${GITHUB_REF_NAME}" || true
      - name: Request Pages rebuild
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds || true
